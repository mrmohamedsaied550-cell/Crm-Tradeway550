<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1f3864">
    <title>Offline · Trade Way CRM</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font: 16px/1.4 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 28rem;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        text-align: center;
      }
      h1 { margin: 0 0 8px; font-size: 18px; }
      p { margin: 0 0 16px; color: #475569; font-size: 14px; }
      button {
        background: #1f3864;
        color: #ffffff;
        border: 0;
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #163056; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>The CRM needs a connection to read leads and send messages. Reconnect and try again.</p>
      <button type="button" onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
