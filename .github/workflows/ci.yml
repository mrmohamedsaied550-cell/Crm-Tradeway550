name: CI

on:
  pull_request:
    branches: [main, claude/**]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-wide minimum permissions. Individual jobs (e.g. gitleaks-action)
# read these. Anything write-needing must opt in per-job.
permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: "20"

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # pnpm version is read from `packageManager` in root package.json — do
      # NOT pass `with: version` here or the action errors out on conflict.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: install
    # Test job alone needs write access to PRs so it can post the test log
    # back to the PR on failure. The repo log surface isn't accessible from
    # external automation, so the comment is our diagnostic channel.
    permissions:
      contents: read
      pull-requests: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_tradeway
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_dev_pass_2026
        ports:
          - 5432:5432
        # Healthcheck so subsequent steps don't race the container.
        options: >-
          --health-cmd "pg_isready -U crm_user -d crm_tradeway"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://crm_user:crm_dev_pass_2026@localhost:5432/crm_tradeway?schema=public
      SEED_DEFAULT_PASSWORD: Password@123
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      # `pnpm install` triggers apps/api's postinstall = `prisma generate`,
      # so the Prisma client types are produced before tsc / tests run.
      - run: pnpm install --frozen-lockfile

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -U crm_user -d crm_tradeway >/dev/null 2>&1; then
              echo "postgres ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "postgres did not become ready"; exit 1

      - name: Apply migrations
        run: pnpm -F @crm/api exec prisma migrate deploy

      - name: Seed database
        run: pnpm db:seed

      - name: Database state snapshot (diagnostic)
        run: |
          PGPASSWORD=crm_dev_pass_2026 psql -h localhost -U crm_user -d crm_tradeway -c "\dt" || true
          PGPASSWORD=crm_dev_pass_2026 psql -h localhost -U crm_user -d crm_tradeway \
            -c "SELECT (SELECT COUNT(*) FROM tenants) AS tenants, (SELECT COUNT(*) FROM capabilities) AS caps;" || true

      - name: Run tests
        run: |
          set -x
          # Dump environment that tests rely on (no secrets — just keys + sanitized DB host).
          echo "node $(node --version)"
          echo "pnpm $(pnpm --version)"
          echo "DATABASE_URL host: $(echo "$DATABASE_URL" | sed -E 's|.*@([^/]+)/.*|\1|')"
          echo "SEED_DEFAULT_PASSWORD set: $([ -n "${SEED_DEFAULT_PASSWORD:-}" ] && echo yes || echo no)"
          # Run the api tests directly so output is unmediated.
          pnpm -F @crm/api test 2>&1 | tee /tmp/api-test.log
          api_exit=${PIPESTATUS[0]}
          echo "api test exit: $api_exit"
          exit "$api_exit"

      - name: Dump test log on failure
        if: failure()
        run: |
          echo "=== /tmp/api-test.log (full) ==="
          cat /tmp/api-test.log || echo "(no log captured)"
          echo "=== DB state on failure ==="
          PGPASSWORD=crm_dev_pass_2026 psql -h localhost -U crm_user -d crm_tradeway -c "\dt" || true
          PGPASSWORD=crm_dev_pass_2026 psql -h localhost -U crm_user -d crm_tradeway \
            -c "SELECT (SELECT COUNT(*) FROM tenants) AS tenants, (SELECT COUNT(*) FROM capabilities) AS caps;" || true
          PGPASSWORD=crm_dev_pass_2026 psql -h localhost -U crm_user -d crm_tradeway \
            -c "SET app.tenant_id = (SELECT id::text FROM tenants WHERE code='trade_way_default'); SELECT COUNT(*) FROM users;" || true

      - name: Post test log to PR on failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Trim the log to the last ~200 lines and wrap it in a code block so
          # the PR comment renders cleanly. We strip ANSI colour codes so the
          # comment is plain ASCII.
          tail -n 200 /tmp/api-test.log 2>/dev/null \
            | sed -E 's/\x1B\[[0-9;]*[A-Za-z]//g' > /tmp/api-test.tail
          {
            printf '### CI Test job failed — last 200 lines of `node:test` output\n\n'
            printf '<details><summary>Output</summary>\n\n```\n'
            cat /tmp/api-test.tail
            printf '\n```\n</details>\n'
          } > /tmp/comment.md
          # POST to /repos/{owner}/{repo}/issues/{pr}/comments
          # Body must be a JSON object with key "body".
          jq -Rs '{ body: . }' /tmp/comment.md > /tmp/comment.json
          curl -fsSL -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            --data @/tmp/comment.json \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            || echo "(comment POST failed)"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    # gitleaks-action needs to read repo contents + PR metadata. The
    # workflow-wide permissions block above already grants both — this
    # comment exists so future maintainers don't accidentally tighten them.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commitlint:
    name: Commitlint (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate commits in PR
        run: |
          pnpm exec commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to   "${{ github.event.pull_request.head.sha }}" \
            --verbose
