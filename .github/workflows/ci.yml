name: CI

on:
  pull_request:
    branches: [main, claude/**]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-wide minimum permissions. Individual jobs (e.g. gitleaks-action)
# read these. Anything write-needing must opt in per-job.
permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: "20"

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # pnpm version is read from `packageManager` in root package.json — do
      # NOT pass `with: version` here or the action errors out on conflict.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: install
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_tradeway
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_dev_pass_2026
        ports:
          - 5432:5432
        # Healthcheck so subsequent steps don't race the container.
        options: >-
          --health-cmd "pg_isready -U crm_user -d crm_tradeway"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://crm_user:crm_dev_pass_2026@localhost:5432/crm_tradeway?schema=public
      SEED_DEFAULT_PASSWORD: Password@123
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      # `pnpm install` triggers apps/api's postinstall = `prisma generate`,
      # so the Prisma client types are produced before tsc / tests run.
      - run: pnpm install --frozen-lockfile

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -U crm_user -d crm_tradeway >/dev/null 2>&1; then
              echo "postgres ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "postgres did not become ready"; exit 1

      - name: Apply migrations
        run: pnpm -F @crm/api exec prisma migrate deploy

      - name: Seed database
        run: pnpm db:seed

      - name: Run tests
        run: pnpm -r --if-present test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    # gitleaks-action needs to read repo contents + PR metadata. The
    # workflow-wide permissions block above already grants both — this
    # comment exists so future maintainers don't accidentally tighten them.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commitlint:
    name: Commitlint (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate commits in PR
        run: |
          pnpm exec commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to   "${{ github.event.pull_request.head.sha }}" \
            --verbose
