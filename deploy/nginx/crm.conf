# Nginx vhost for Trade Way CRM (single-origin reverse proxy).
#
# /api/*  + /health  → API (NestJS, container "api", port 3000)
# everything else    → Web (Next.js, container "web", port 3001)

upstream crm_api {
    server api:3000;
    keepalive 32;
}
upstream crm_web {
    server web:3001;
    keepalive 32;
}

server {
    listen      80 default_server;
    server_name _;

    # Allow file uploads (e.g. lead imports) up to 25 MB; tune as needed.
    client_max_body_size 25m;
    server_tokens off;

    # Common proxy headers reused by both location blocks.
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";
    proxy_read_timeout 60s;

    # Health endpoint lives at the root in NestJS (excluded from /api/v1 prefix).
    location = /health {
        proxy_pass http://crm_api;
    }

    # Everything under /api goes to the API container.
    location /api/ {
        proxy_pass http://crm_api;
    }

    # Everything else: the Next.js app.
    # Pass websocket upgrade headers so Next.js HMR (and future websocket
    # routes) work transparently.
    location / {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://crm_web;
    }
}

